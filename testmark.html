<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grade Calculator</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 35px;
            border-radius: 18px;
            width: 340px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00f5d4, #00bbf9);
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        .output {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Grade Calculator</h2>

    <input type="number" id="m1" placeholder="Subject 1">
    <input type="number" id="m2" placeholder="Subject 2">
    <input type="number" id="m3" placeholder="Subject 3">
    <input type="number" id="m4" placeholder="Subject 4">
    <input type="number" id="m5" placeholder="Subject 5">

    <button onclick="processResults()">Generate Result</button>

    <div class="error" id="errorMsg"></div>
    <div class="output" id="displayResult"></div>
</div>

<script>
function processResults() {
    const marks = [
        m1.value, m2.value, m3.value, m4.value, m5.value
    ];

    const errorMsg = document.getElementById("errorMsg");
    const displayResult = document.getElementById("displayResult");

    errorMsg.textContent = "";
    displayResult.innerHTML = "";

    for (let i = 0; i < marks.length; i++) {
        if (marks[i] === "" || marks[i] < 0 || marks[i] > 100) {
            errorMsg.textContent = "Enter marks between 0 and 100.";
            return;
        }
    }

    const total = marks.map(Number).reduce((a, b) => a + b, 0);
    const average = total / 5;

    let grade;
    if (average >= 90) grade = "A+";
    else if (average >= 80) grade = "A";
    else if (average >= 70) grade = "B";
    else if (average >= 60) grade = "C";
    else if (average >= 50) grade = "D";
    else grade = "F";

    displayResult.innerHTML = `
        <p>Total: ${total}</p>
        <p>Average: ${average.toFixed(2)}</p>
        <p>Grade: ${grade}</p>
    `;
}
</script>

</body>
</html>
