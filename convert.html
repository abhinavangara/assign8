<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Number to Words Converter</title>

<style>
    body {
        font-family: Verdana, sans-serif;
        background-color: #f4f6f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        width: 320px;
        text-align: center;
    }

    input {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    button {
        padding: 10px;
        width: 100%;
        font-size: 16px;
        background-color: #007BFF;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;
    }

    .output {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: #2e7d32;
        min-height: 24px;
    }

    .error {
        color: red;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">
    <h3>Number to Words (0–999)</h3>

    <form id="numberForm">
        <input 
            type="text" 
            id="numberInput"
            placeholder="Enter number (0-999)"
            maxlength="3"
            pattern="^\d{1,3}$"
            required
        >
        <button type="submit">Convert</button>
    </form>

    <div id="message" class="output"></div>
</div>

<script>
const form = document.getElementById("numberForm");
const input = document.getElementById("numberInput");
const message = document.getElementById("message");

// Restrict input to digits only while typing
input.addEventListener("input", () => {
    input.value = input.value.replace(/\D/g, '');
});

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const value = Number(input.value);

    if (value < 0 || value > 999) {
        message.innerHTML = "<span class='error'>Please enter a number between 0 and 999.</span>";
        return;
    }

    message.textContent = convertToWords(value);
});

function convertToWords(num) {

    const ones = ["", "One", "Two", "Three", "Four", "Five",
                  "Six", "Seven", "Eight", "Nine"];

    const teens = ["Ten", "Eleven", "Twelve", "Thirteen", "Fourteen",
                   "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];

    const tens = ["", "", "Twenty", "Thirty", "Forty",
                  "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];

    if (num === 0) return "Zero";

    let words = "";

    if (num >= 100) {
        words += ones[Math.floor(num / 100)] + " Hundred ";
        num %= 100;
    }

    if (num >= 10 && num <= 19) {
        words += teens[num - 10];
    } else {
        if (num >= 20) {
            words += tens[Math.floor(num / 10)] + " ";
            num %= 10;
        }
        if (num > 0) {
            words += ones[num];
        }
    }

    return words.trim();
}
</script>

</body>
</html>
